services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: malina
      POSTGRES_USER: malina
      POSTGRES_PASSWORD: malinaAdminP
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malina -d malina"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://malina:malinaAdminP@db:5432/malina?schema=public
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_REVIEW_CHAT_ID: ${TELEGRAM_REVIEW_CHAT_ID:-}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-502773482,111111}
      ADMIN_CREDENTIAL: malinaAdminP
      PUBLIC_SITE_URL: https://malina.kiruhak11.ru
    command: sh -c "npm run prisma:generate && npx prisma db push --skip-generate && npm run prisma:seed && node .output/server/index.mjs"
    ports:
      - '127.0.0.1:4015:3000'
    volumes:
      - uploads-telegram:/app/public/uploads/telegram
      - uploads-admin:/app/public/uploads/admin

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - web
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      BOT_FORWARD_URL: http://web:3000/api/telegram/webhook
    command: npm run bot
    volumes:
      - uploads-telegram:/app/public/uploads/telegram

volumes:
  pg-data:
  uploads-telegram:
  uploads-admin:
